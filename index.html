<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi MI Khadijah</title>
    
    <!-- Memuat Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Memuat React dan ReactDOM versi UMD yang stabil dari cdnjs -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Memuat Babel Standalone versi UMD dari cdnjs untuk menghindari masalah ES Module di iframe GAS -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js"></script>

    <style>
      @media print {
        .nota-print-page {
          width: 100%;
          display: block !important; /* Stack secara vertikal untuk pengaturan page break individu */
          box-sizing: border-box;
        }
        .nota-card {
          width: 100%;
          page-break-after: always;
          break-inside: avoid;
          box-sizing: border-box;
          padding: 5mm !important; /* Padding lebih rapat agar muat di ukuran A6 */
          font-size: 10pt !important;
          line-height: 1.2 !important;
          border: 1px solid black !important;
        }
        .nota-card:last-child { 
          page-break-after: avoid; 
        }
        /* Membuat padding kolom cetak jauh lebih rapat */
        .nota-card table th, 
        .nota-card table td {
          padding: 1.5mm 3mm !important; /* Padding kolom super rapat */
          font-size: 9.5pt !important;
        }
        /* Memperkecil margin elemen teks pendukung di nota */
        .nota-card h2, 
        .nota-card p {
          margin: 0 0 1mm 0 !important;
        }
        .nota-card .mb-2 {
          margin-bottom: 2mm !important;
        }
        .nota-card .mb-1 {
          margin-bottom: 1mm !important;
        }
        .nota-card .pb-1 {
          padding-bottom: 1mm !important;
        }
        @page { 
          size: A6 portrait; /* Ukuran kertas A6 */
          margin: 5mm; 
        }
      }
      @media screen {
        .nota-print-page {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          gap: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!-- Menambahkan data-presets secara eksplisit untuk memberi tahu Babel cara menerjemahkan kode -->
    <script type="text/babel" data-presets="env,react">
      const { useState, useEffect, useMemo } = React;

      // ==========================================
      // KONFIGURASI API (WAJIB DIISI UNTUK GITHUB)
      // ==========================================
      const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyyugwykcnxEFH-bUwR9P6Ulst7dSIIZl-cpuP5DdW_raw1kdzzqxcLauZMo52yXQQ/exec"; 

      const Icons = {
        Home: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>,
        Shield: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>,
        Users: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" /></svg>,
        CalendarX: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>,
        FileText: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>,
        Printer: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>,
        Trash: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>,
        UserMinus: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 7a4 4 0 11-8 0 4 4 0 018 0zM9 14a6 6 0 00-6 6v1h12v-1a6 6 0 00-6-6zM21 12h-6m3-3v6" /></svg>,
        Money: () => <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V6m0 10v2m9-8a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>,
        Lock: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 10-8 0v2" /></svg>,
        Unlock: () => <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm2-10V7a4 4 0 118 0" /></svg>
      };

      const CLASSES = ['1A', '1B', '2A', '2B', '3A', '3B', '4A', '4B', '5A', '5B', '6A', '6B'];

      // --- UTILS ---
      const generateId = () => Math.random().toString(36).substr(2, 9);
      const getTodayString = () => new Date().toISOString().split('T')[0];

      const syncDataToBackend = (actionName, dataPayload) => {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
           google.script.run[actionName](dataPayload);
        } else if (GAS_WEB_APP_URL && GAS_WEB_APP_URL !== "URL_WEB_APP_ANDA_DISINI") {
           fetch(GAS_WEB_APP_URL, {
             redirect: "follow",
             method: 'POST',
             headers: {
               'Content-Type': 'text/plain;charset=utf-8'
             },
             body: JSON.stringify({ action: actionName, payload: dataPayload })
           }).catch(err => console.error(`Error syncing ${actionName}:`, err));
        }
      };

      function App() {
        const [view, setView] = useState('public'); 
        const [adminTab, setAdminTab] = useState('guru'); 
        
        const [teachers, setTeachers] = useState([]);
        const [holidays, setHolidays] = useState([]); 
        const [leaves, setLeaves] = useState([]); 
        const [attendances, setAttendances] = useState([]); 
        const [teacherAbsences, setTeacherAbsences] = useState([]);
        const [bisyarohColumns, setBisyarohColumns] = useState([]); 
        const [bisyarohValues, setBisyarohValues] = useState([]); 
        const [bisyarohLocks, setBisyarohLocks] = useState([]); 
        
        const [toast, setToast] = useState(null);
        const [isLoading, setIsLoading] = useState(true);
        const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
        const [passwordInput, setPasswordInput] = useState('');
        const [authError, setAuthError] = useState('');

        const showToast = (msg, type = 'success') => {
          setToast({ msg, type });
          setTimeout(() => setToast(null), 3000);
        };

        useEffect(() => {
          if (typeof google !== 'undefined' && google.script && google.script.run) {
            google.script.run
              .withSuccessHandler((data) => {
                setTeachers(data.teachers || []);
                setHolidays(data.holidays || []);
                setLeaves(data.leaves || []);
                setAttendances(data.attendances || []);
                setTeacherAbsences(data.teacherAbsences || []);
                setBisyarohColumns(data.bisyarohColumns || []);
                setBisyarohValues(data.bisyarohValues || []);
                setBisyarohLocks(data.bisyarohLocks || []);
                setIsLoading(false);
                showToast("Data disinkronkan dengan Google Sheets!");
              })
              .withFailureHandler((err) => {
                showToast("Gagal memuat spreadsheet: " + err.message, "error");
                loadFromLocalStorage();
                setIsLoading(false);
              })
              .getInitialData();
          } else if (GAS_WEB_APP_URL && GAS_WEB_APP_URL !== "URL_WEB_APP_ANDA_DISINI") {
            fetch(GAS_WEB_APP_URL + "?api=true")
              .then(res => res.json())
              .then(res => {
                if(res.status === 'success') {
                  const data = res.data;
                  setTeachers(data.teachers || []);
                  setHolidays(data.holidays || []);
                  setLeaves(data.leaves || []);
                  setAttendances(data.attendances || []);
                  setTeacherAbsences(data.teacherAbsences || []);
                  setBisyarohColumns(data.bisyarohColumns || []);
                  setBisyarohValues(data.bisyarohValues || []);
                  setBisyarohLocks(data.bisyarohLocks || []);
                  setIsLoading(false);
                  showToast("Data disinkronkan via API (Github mode)!");
                }
              })
              .catch(err => {
                 showToast("Gagal memuat via API. Memuat dari memori lokal.", "error");
                 loadFromLocalStorage();
                 setIsLoading(false);
              });
          } else {
            showToast("PERHATIAN: URL API belum dikonfigurasi. Menggunakan memori lokal.", "error");
            loadFromLocalStorage();
            setIsLoading(false);
          }
        }, []);

        const loadFromLocalStorage = () => {
          const dTeachers = JSON.parse(localStorage.getItem('mi_teachers') || '[]');
          const dHolidays = JSON.parse(localStorage.getItem('mi_holidays') || '[]');
          const dLeaves = JSON.parse(localStorage.getItem('mi_leaves') || '[]');
          const dAttendances = JSON.parse(localStorage.getItem('mi_attendances') || '[]');
          const dTeacherAbsences = JSON.parse(localStorage.getItem('mi_teacherAbsences') || '[]');
          const dBisyarohColumns = JSON.parse(localStorage.getItem('mi_bisyarohColumns') || '[]');
          const dBisyarohValues = JSON.parse(localStorage.getItem('mi_bisyarohValues') || '[]');
          const dBisyarohLocks = JSON.parse(localStorage.getItem('mi_bisyarohLocks') || '[]');
          
          if(dTeachers.length > 0) setTeachers(dTeachers);
          if(dHolidays.length > 0) setHolidays(dHolidays);
          if(dLeaves.length > 0) setLeaves(dLeaves);
          if(dAttendances.length > 0) setAttendances(dAttendances);
          if(dTeacherAbsences.length > 0) setTeacherAbsences(dTeacherAbsences);
          if(dBisyarohColumns.length > 0) setBisyarohColumns(dBisyarohColumns);
          if(dBisyarohValues.length > 0) setBisyarohValues(dBisyarohValues);
          if(dBisyarohLocks.length > 0) setBisyarohLocks(dBisyarohLocks);
        };

        useEffect(() => {
          if (isLoading) return;
          localStorage.setItem('mi_teachers', JSON.stringify(teachers));
          syncDataToBackend('saveTeachers', teachers);
        }, [teachers, isLoading]);

        useEffect(() => {
          if (isLoading) return;
          localStorage.setItem('mi_holidays', JSON.stringify(holidays));
          syncDataToBackend('saveHolidays', holidays);
        }, [holidays, isLoading]);

        useEffect(() => {
          if (isLoading) return;
          localStorage.setItem('mi_leaves', JSON.stringify(leaves));
          syncDataToBackend('saveLeaves', leaves);
        }, [leaves, isLoading]);

        useEffect(() => {
          if (isLoading) return;
          localStorage.setItem('mi_attendances', JSON.stringify(attendances));
          syncDataToBackend('saveAttendances', attendances);
        }, [attendances, isLoading]);

        useEffect(() => {
          if (isLoading) return;
          localStorage.setItem('mi_teacherAbsences', JSON.stringify(teacherAbsences));
          syncDataToBackend('saveTeacherAbsences', teacherAbsences);
        }, [teacherAbsences, isLoading]);

        useEffect(() => {
          if (isLoading) return;
          localStorage.setItem('mi_bisyarohColumns', JSON.stringify(bisyarohColumns));
          syncDataToBackend('saveBisyarohColumns', bisyarohColumns);
        }, [bisyarohColumns, isLoading]);

        useEffect(() => {
          if (isLoading) return;
          localStorage.setItem('mi_bisyarohValues', JSON.stringify(bisyarohValues));
          syncDataToBackend('saveBisyarohValues', bisyarohValues);
        }, [bisyarohValues, isLoading]);

        useEffect(() => {
          if (isLoading) return;
          localStorage.setItem('mi_bisyarohLocks', JSON.stringify(bisyarohLocks));
          syncDataToBackend('saveBisyarohLocks', bisyarohLocks);
        }, [bisyarohLocks, isLoading]);

        const handleAdminLogin = (e) => {
          e.preventDefault();
          if (passwordInput === 'admin123') {
            setIsAdminAuthenticated(true);
            setAuthError('');
            setPasswordInput('');
            showToast('Login Admin Berhasil!');
          } else {
            setAuthError('Password salah! Coba lagi.');
          }
        };

        const handleAdminLogout = () => {
          setIsAdminAuthenticated(false);
          setView('public');
          showToast('Log out berhasil');
        };

        const handleViewChange = (newView) => {
          if (newView === 'admin' && !isAdminAuthenticated) {
            setAuthError('');
            setPasswordInput('');
          }
          setView(newView);
        };

        return (
          <div className="min-h-screen bg-gray-50 text-gray-800 font-sans selection:bg-emerald-200">
            
            {/* Toast Notification */}
            {toast && (
              <div className={`fixed top-4 right-4 px-6 py-3 rounded-lg shadow-lg z-50 transition-all text-white font-medium ${toast.type === 'error' ? 'bg-red-500' : 'bg-emerald-600'}`}>
                {toast.msg}
              </div>
            )}

            {/* Header (No print) */}
            <header className="bg-emerald-800 text-white shadow-md print:hidden">
              <div className="max-w-6xl mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
                <div className="flex items-center space-x-3 w-full md:w-auto justify-center md:justify-start">
                  <div className="bg-white p-2 rounded-full">
                    <svg className="w-6 h-6 text-emerald-800" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
                  </div>
                  <div>
                    <h1 className="text-xl font-bold tracking-wide">MI KHADIJAH</h1>
                    <p className="text-xs text-emerald-200">Sistem Absensi Digital</p>
                  </div>
                </div>
                <nav className="flex flex-wrap justify-center gap-2 bg-emerald-900/50 p-1.5 rounded-lg w-full md:w-auto">
                  <button 
                    disabled={isLoading}
                    onClick={() => handleViewChange('public')}
                    className={`px-3 py-2 rounded-md flex items-center space-x-2 text-sm font-medium transition-colors ${view === 'public' ? 'bg-white text-emerald-900 shadow' : 'text-emerald-100 hover:text-white hover:bg-emerald-700'}`}
                  >
                    <Icons.Home /> <span className="inline">Absensi</span>
                  </button>
                  <button 
                    disabled={isLoading}
                    onClick={() => handleViewChange('guru-izin')}
                    className={`px-3 py-2 rounded-md flex items-center space-x-2 text-sm font-medium transition-colors ${view === 'guru-izin' ? 'bg-white text-emerald-900 shadow' : 'text-emerald-100 hover:text-white hover:bg-emerald-700'}`}
                  >
                    <Icons.UserMinus /> <span className="inline">Guru Izin</span>
                  </button>
                  <button 
                    disabled={isLoading}
                    onClick={() => handleViewChange('admin')}
                    className={`px-3 py-2 rounded-md flex items-center space-x-2 text-sm font-medium transition-colors ${view === 'admin' ? 'bg-white text-emerald-900 shadow' : 'text-emerald-100 hover:text-white hover:bg-emerald-700'}`}
                  >
                    <Icons.Shield /> <span className="inline">Admin</span>
                  </button>
                  {isAdminAuthenticated && (
                    <button 
                      onClick={handleAdminLogout}
                      className="px-3 py-2 rounded-md flex items-center text-sm font-medium text-red-200 hover:text-red-100 hover:bg-red-900/40 transition-colors"
                      title="Logout Admin"
                    >
                      <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                    </button>
                  )}
                </nav>
              </div>
            </header>

            {/* Main Content Area */}
            <main className="p-4 print:p-0">
              {isLoading ? (
                <div className="flex flex-col items-center justify-center py-20">
                  <div className="w-12 h-12 border-4 border-emerald-600 border-t-transparent rounded-full animate-spin mb-4"></div>
                  <p className="text-gray-500 font-medium">Sinkronisasi data dengan Google Sheets...</p>
                </div>
              ) : (
                <>
                  {view === 'public' && (
                    <PublicView 
                      teachers={teachers} 
                      attendances={attendances} 
                      setAttendances={setAttendances}
                      holidays={holidays}
                      leaves={leaves}
                      showToast={showToast}
                    />
                  )}

                  {/* MENU: GURU IZIN */}
                  {view === 'guru-izin' && (
                    <GuruIzinView 
                      teachers={teachers} 
                      teacherAbsences={teacherAbsences} 
                      setTeacherAbsences={setTeacherAbsences}
                      holidays={holidays}
                      showToast={showToast}
                    />
                  )}
                  
                  {view === 'admin' && (
                    <div className="max-w-6xl mx-auto print:max-w-none">
                      {!isAdminAuthenticated ? (
                        /* Admin Password Gate Screen */
                        <div className="max-w-md mx-auto mt-12 bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                          <div className="text-center mb-6">
                            <div className="inline-flex p-3 bg-emerald-50 rounded-full text-emerald-600 mb-2">
                              <Icons.Shield />
                            </div>
                            <h2 className="text-xl font-bold text-gray-800">Akses Terbatas Admin</h2>
                            <p className="text-xs text-gray-500 mt-1">Masukkan password otentikasi administrator</p>
                          </div>
                          
                          <form onSubmit={handleAdminLogin} className="space-y-4">
                            <div>
                              <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                              <input 
                                type="password" 
                                value={passwordInput}
                                onChange={(e) => setPasswordInput(e.target.value)}
                                className="w-full border-gray-300 rounded-lg shadow-sm focus:ring-emerald-500 focus:border-emerald-500 p-2.5 border text-center font-mono text-lg tracking-widest"
                                placeholder="••••••••"
                                required
                                autoFocus
                              />
                            </div>
                            {authError && (
                              <p className="text-sm text-red-600 text-center font-medium bg-red-50 py-1.5 rounded-md">
                                {authError}
                              </p>
                            )}
                            <button 
                              type="submit" 
                              className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-4 rounded-xl transition-colors shadow-sm"
                            >
                              Masuk Menu Admin
                            </button>
                          </form>
                        </div>
                      ) : (
                        /* Authenticated Admin Area */
                        <div>
                          {/* Admin Tabs (No print) */}
                          <div className="flex overflow-x-auto space-x-2 bg-white p-2 rounded-xl shadow-sm mb-6 print:hidden">
                            {[
                              { id: 'guru', label: 'Data Guru & JTM', icon: Icons.Users },
                              { id: 'libur', label: 'Hari Libur', icon: Icons.CalendarX },
                              { id: 'izin', label: 'Data Izin', icon: Icons.FileText },
                              { id: 'bisyaroh', label: 'Bisyaroh (Gaji)', icon: Icons.Money },
                              { id: 'laporan', label: 'Cetak Laporan', icon: Icons.Printer },
                            ].map(tab => (
                              <button
                                key={tab.id}
                                onClick={() => setAdminTab(tab.id)}
                                className={`flex items-center space-x-2 px-4 py-2.5 rounded-lg text-sm font-medium whitespace-nowrap transition-colors ${adminTab === tab.id ? 'bg-emerald-100 text-emerald-800' : 'text-gray-600 hover:bg-gray-100'}`}
                              >
                                <tab.icon /> <span>{tab.label}</span>
                              </button>
                            ))}
                          </div>

                          {/* Admin Tab Contents */}
                          {adminTab === 'guru' && <ManageTeachers teachers={teachers} setTeachers={setTeachers} showToast={showToast} />}
                          {adminTab === 'libur' && <ManageHolidays holidays={holidays} setHolidays={setHolidays} showToast={showToast} />}
                          {adminTab === 'izin' && <ManageLeaves leaves={leaves} setLeaves={setLeaves} teachers={teachers} showToast={showToast} />}
                          {adminTab === 'bisyaroh' && (
                            <BisyarohView 
                              teachers={teachers} 
                              holidays={holidays} 
                              leaves={leaves} 
                              attendances={attendances} 
                              teacherAbsences={teacherAbsences}
                              bisyarohColumns={bisyarohColumns}
                              setBisyarohColumns={setBisyarohColumns}
                              bisyarohValues={bisyarohValues}
                              setBisyarohValues={setBisyarohValues}
                              bisyarohLocks={bisyarohLocks}
                              setBisyarohLocks={setBisyarohLocks}
                              showToast={showToast}
                            />
                          )}
                          {adminTab === 'laporan' && <ReportView teachers={teachers} holidays={holidays} leaves={leaves} attendances={attendances} teacherAbsences={teacherAbsences} />}
                        </div>
                      )}
                    </div>
                  )}
                </>
              )}
            </main>
          </div>
        );
      }

      function PublicView({ teachers, attendances, setAttendances, holidays, leaves, showToast }) {
        const [selectedDate, setSelectedDate] = useState(getTodayString());
        const [selectedTeacher, setSelectedTeacher] = useState('');
        
        const initialHours = Array.from({ length: 9 }, (_, i) => ({
          hour: i + 1,
          checked: false,
          className: '',
          subId: ''
        }));
        const [hoursData, setHoursData] = useState(initialHours);

        const dateObj = new Date(selectedDate);
        const isSunday = dateObj.getDay() === 0;
        
        const isHoliday = useMemo(() => {
          return holidays.includes(selectedDate);
        }, [selectedDate, holidays]);

        const leaveInfo = useMemo(() => {
          return leaves.find(l => String(l.teacherId) === String(selectedTeacher) && l.date === selectedDate);
        }, [selectedTeacher, selectedDate, leaves]);

        const isTeacherOnLeave = !!leaveInfo;
        const leaveReason = leaveInfo ? leaveInfo.reason : '';

        useEffect(() => {
          setHoursData(Array.from({ length: 9 }, (_, i) => ({
            hour: i + 1, checked: false, className: '', subId: ''
          })));
        }, [selectedDate, isSunday, isHoliday]);

        const handleHourToggle = (index) => {
          if (isTeacherOnLeave) {
            showToast('Guru sedang izin/sakit, tidak dapat mengisi jam pelajaran!', 'error');
            return;
          }

          const newH = [...hoursData];
          newH[index].checked = !newH[index].checked;
          if(!newH[index].checked) {
            newH[index].className = '';
            newH[index].subId = '';
          }
          setHoursData(newH);
        };

        const handleHourChange = (index, field, value) => {
          const newH = [...hoursData];
          newH[index][field] = value;
          setHoursData(newH);
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          if (isSunday || isHoliday) {
            return showToast('Tidak dapat melakukan absensi pada hari Minggu atau Hari Libur!', 'error');
          }

          if (!selectedTeacher) return showToast('Pilih nama guru terlebih dahulu!', 'error');
          
          if (isTeacherOnLeave) {
            return showToast(`Guru sedang izin/sakit (${leaveReason}). Pengisian ditolak.`, 'error');
          }

          const validHours = hoursData.filter(h => h.checked);
          if (validHours.length === 0) return showToast('Pilih minimal 1 jam pelajaran!', 'error');
          
          for (const item of validHours) {
             if (!item.className || !item.subId) {
                return showToast(`Lengkapi pilihan kelas dan guru yang digantikan untuk Jam ke-${item.hour}`, 'error');
             }
          }

          for (const item of validHours) {
            const clashAttendance = attendances.find(att => {
              if (att.date === selectedDate && String(att.teacherId) !== String(selectedTeacher)) {
                return att.hours.some(h => h.hour === item.hour && h.className === item.className);
              }
              return false;
            });

            if (clashAttendance) {
              const otherTeacherName = teachers.find(t => String(t.id) === String(clashAttendance.teacherId))?.name || 'Guru Lain';
              return showToast(`Jam ke-${item.hour} di Kelas ${item.className} sudah diisi oleh ${otherTeacherName}!`, 'error');
            }

            const existingRecord = attendances.find(a => String(a.teacherId) === String(selectedTeacher) && a.date === selectedDate);
            if (existingRecord) {
              const existingHour = existingRecord.hours.find(h => h.hour === item.hour);
              if (existingHour && existingHour.className !== item.className) {
                return showToast(`Gagal! Anda sudah terdata mengajar Jam ke-${item.hour} di Kelas ${existingHour.className}. Tidak dapat mengisi di kelas berbeda pada jam yang sama!`, 'error');
              }
            }
          }

          const newAttendance = {
            id: generateId(),
            date: selectedDate,
            teacherId: selectedTeacher,
            hours: validHours.map(({hour, className, subId}) => ({hour, className, subId}))
          };

          const filtered = attendances.filter(a => !(String(a.teacherId) === String(selectedTeacher) && a.date === selectedDate));
          setAttendances([...filtered, newAttendance]);
          showToast('Absensi berhasil disimpan!');
          
          setSelectedTeacher('');
          setHoursData(Array.from({ length: 9 }, (_, i) => ({
            hour: i + 1, checked: false, className: '', subId: ''
          })));
        };

        return (
          <div className="max-w-2xl mx-auto">
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
              <h2 className="text-2xl font-bold text-emerald-900 mb-6 text-center">Input Absensi Hadir</h2>
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Tanggal</label>
                  <input 
                    type="date" 
                    value={selectedDate}
                    onChange={(e) => setSelectedDate(e.target.value)}
                    className="w-full border-gray-300 rounded-lg shadow-sm focus:ring-emerald-500 focus:border-emerald-500 p-2.5 border"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Nama Guru (Hadir)</label>
                  <select 
                    value={selectedTeacher}
                    onChange={(e) => setSelectedTeacher(e.target.value)}
                    disabled={isSunday || isHoliday}
                    className="w-full border-gray-300 rounded-lg shadow-sm focus:ring-emerald-500 focus:border-emerald-500 p-2.5 border disabled:bg-gray-100"
                  >
                    <option value="">-- Pilih Guru --</option>
                    {teachers.map(t => {
                      const hasLeave = leaves.some(l => String(l.teacherId) === String(t.id) && l.date === selectedDate);
                      return (
                        <option key={t.id} value={t.id}>
                          {t.name} {hasLeave ? ' (Izin/Sakit)' : ''}
                        </option>
                      );
                    })}
                  </select>
                </div>
              </div>

              {isSunday ? (
                <div className="bg-red-50 text-red-700 p-6 rounded-xl text-center border border-red-100">
                  <h3 className="font-bold text-lg mb-1">Hari Minggu Libur</h3>
                  <p className="text-sm">Sistem absensi dinonaktifkan pada hari Minggu.</p>
                </div>
              ) : isHoliday ? (
                <div className="bg-amber-50 text-amber-700 p-6 rounded-xl text-center border border-amber-100">
                  <h3 className="font-bold text-lg mb-1">Hari Libur Sekolah</h3>
                  <p className="text-sm">Tanggal ini telah dikonfigurasi sebagai hari libur oleh Admin. Pengisian absensi dinonaktifkan.</p>
                </div>
              ) : isTeacherOnLeave ? (
                <div className="bg-red-50 text-red-700 p-6 rounded-xl text-center border border-red-100">
                  <h3 className="font-bold text-lg mb-1">Guru Sedang Berhalangan / Izin</h3>
                  <p className="text-sm mb-2">Guru yang dipilih terdaftar sedang izin mengajar pada hari ini.</p>
                  <div className="inline-block bg-white px-4 py-1.5 rounded-lg text-xs font-semibold uppercase tracking-wider border border-red-200">
                    Keterangan: {leaveReason || 'Tanpa keterangan'}
                  </div>
                </div>
              ) : (
                <form onSubmit={handleSubmit}>
                  {selectedTeacher ? (
                    <div className="bg-gray-50 p-4 rounded-xl border border-gray-200 mb-6">
                      <div className="flex justify-between items-center mb-4">
                        <h3 className="font-semibold text-gray-800">Jam Mengajar</h3>
                      </div>
                      
                      <div className="space-y-3">
                        {hoursData.map((h, i) => (
                          <div key={h.hour} className={`flex flex-col sm:flex-row gap-3 items-start sm:items-center p-3 rounded-lg border transition-all ${h.checked ? 'bg-white border-emerald-300 shadow-sm' : 'bg-gray-50 border-gray-200'}`}>
                            <div className="flex items-center w-32">
                              <input 
                                type="checkbox" 
                                id={`hour-${h.hour}`}
                                checked={h.checked}
                                onChange={() => handleHourToggle(i)}
                                className="w-5 h-5 text-emerald-600 rounded border-gray-300 focus:ring-emerald-500"
                              />
                              <label htmlFor={`hour-${h.hour}`} className="ml-3 font-medium text-gray-700 cursor-pointer">Jam ke-{h.hour}</label>
                            </div>
                            
                            {h.checked && (
                              <div className="flex-1 flex flex-col sm:flex-row gap-3 w-full">
                                <select 
                                  value={h.className} 
                                  onChange={(e) => handleHourChange(i, 'className', e.target.value)}
                                  className="flex-1 border-gray-300 rounded-md text-sm p-2 border focus:ring-emerald-500 focus:border-emerald-500"
                                >
                                  <option value="">- Kelas -</option>
                                  {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                                </select>
                                
                                <select 
                                  value={h.subId} 
                                  onChange={(e) => handleHourChange(i, 'subId', e.target.value)}
                                  className="flex-[2] border-gray-300 rounded-md text-sm p-2 border focus:ring-emerald-500 focus:border-emerald-500"
                                >
                                  <option value="">- Guru yang digantikan -</option>
                                  {teachers.filter(t => {
                                    if (String(t.id) === String(selectedTeacher)) return false;
                                    const alreadySubbedAtThisHour = attendances.some(att =>
                                      att.date === selectedDate &&
                                      String(att.teacherId) !== String(selectedTeacher) &&
                                      att.hours.some(ah => ah.hour === h.hour && String(ah.subId) === String(t.id))
                                    );
                                    return !alreadySubbedAtThisHour;
                                  }).map(t => (
                                    <option key={t.id} value={t.id}>Ganti: {t.name}</option>
                                  ))}
                                </select>
                              </div>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  ) : (
                     <div className="text-center p-8 text-gray-400 bg-gray-50 rounded-xl border border-dashed border-gray-300">
                      Pilih nama guru di atas untuk mulai mengisi absensi jam pelajaran.
                    </div>
                  )}

                  <button 
                    type="submit" 
                    disabled={!selectedTeacher || isTeacherOnLeave}
                    className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl transition-colors shadow-sm disabled:opacity-50 disabled:cursor-not-allowed"
                  >
                    Simpan Absensi
                  </button>
                </form>
              )}
            </div>
          </div>
        );
      }

      function GuruIzinView({ teachers, teacherAbsences, setTeacherAbsences, holidays, showToast }) {
        const [selectedDate, setSelectedDate] = useState(getTodayString());
        const [hoursData, setHoursData] = useState([]);

        const dateObj = new Date(selectedDate);
        const isSunday = dateObj.getDay() === 0;
        
        const isHoliday = useMemo(() => {
          return holidays.includes(selectedDate);
        }, [selectedDate, holidays]);

        useEffect(() => {
          setHoursData(Array.from({ length: 9 }, (_, i) => ({
            hour: i + 1,
            checked: false,
            className: '',
            missingTeacherId: ''
          })));
        }, [selectedDate, isSunday, isHoliday]);

        const handleHourToggle = (index) => {
          const newH = [...hoursData];
          newH[index].checked = !newH[index].checked;
          if(!newH[index].checked) {
            newH[index].className = '';
            newH[index].missingTeacherId = '';
          }
          setHoursData(newH);
        };

        const handleHourChange = (index, field, value) => {
          const newH = [...hoursData];
          newH[index][field] = value;
          setHoursData(newH);
        };

        const handleSubmit = (e) => {
          e.preventDefault();
          if (isSunday || isHoliday) {
            return showToast('Sistem ditutup pada hari libur!', 'error');
          }

          const validHours = hoursData.filter(h => h.checked);
          if (validHours.length === 0) return showToast('Pilih minimal 1 jam pelajaran!', 'error');
          
          const existingAbsencesForDate = teacherAbsences.filter(a => a.date === selectedDate);
          const allExistingHours = [];
          existingAbsencesForDate.forEach(record => {
            record.hours.forEach(h => {
              allExistingHours.push(h);
            });
          });

          for (const item of validHours) {
            if (!item.className || !item.missingTeacherId) {
                return showToast(`Lengkapi pilihan kelas dan guru yang tidak hadir pada Jam ke-${item.hour}`, 'error');
            }
            
            const classClash = allExistingHours.find(h => 
                h.hour === item.hour && 
                h.className === item.className
            );
            if (classClash) {
                const clashedTeacher = teachers.find(t => String(t.id) === String(classClash.missingTeacherId))?.name || 'Guru Lain';
                return showToast(`Gagal! Jam ke-${item.hour} di Kelas ${item.className} sudah diinput izin atas nama ${clashedTeacher}.`, 'error');
            }

            const teacherClash = allExistingHours.find(h => 
                h.hour === item.hour && 
                String(h.missingTeacherId) === String(item.missingTeacherId)
            );
            if (teacherClash) {
                 const clashedTeacher = teachers.find(t => String(t.id) === String(item.missingTeacherId))?.name || 'Guru';
                 return showToast(`Gagal! ${clashedTeacher} sudah terdata izin pada Jam ke-${item.hour} di kelas lain (${teacherClash.className}).`, 'error');
            }
          }

          const newAbsenceRecord = {
            id: generateId(),
            date: selectedDate,
            hours: validHours.map(({hour, className, missingTeacherId}) => ({hour, className, missingTeacherId}))
          };

          setTeacherAbsences([...teacherAbsences, newAbsenceRecord]);
          showToast('Data guru tidak hadir berhasil disimpan!');
          
          setHoursData(Array.from({ length: 9 }, (_, i) => ({
            hour: i + 1,
            checked: false,
            className: '',
            missingTeacherId: ''
          })));
        };

        return (
          <div className="max-w-2xl mx-auto">
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
              <h2 className="text-2xl font-bold text-red-900 mb-6 text-center">Input Guru Izin (Jam Kosong)</h2>
              
              <div className="mb-6">
                <label className="block text-sm font-medium text-gray-700 mb-1">Pilih Tanggal</label>
                <input 
                  type="date" 
                  value={selectedDate}
                  onChange={(e) => setSelectedDate(e.target.value)}
                  className="w-full border-gray-300 rounded-lg shadow-sm focus:ring-red-500 focus:border-red-500 p-2.5 border"
                />
              </div>

              {isSunday ? (
                <div className="bg-red-50 text-red-700 p-6 rounded-xl text-center border border-red-100">
                  <h3 className="font-bold text-lg mb-1">Hari Minggu Libur</h3>
                  <p className="text-sm">Tidak ada jam mengajar.</p>
                </div>
              ) : isHoliday ? (
                <div className="bg-amber-50 text-amber-700 p-6 rounded-xl text-center border border-amber-100">
                  <h3 className="font-bold text-lg mb-1">Hari Libur Sekolah</h3>
                  <p className="text-sm">Pengisian dinonaktifkan.</p>
                </div>
              ) : (
                <form onSubmit={handleSubmit}>
                  <div className="bg-red-50/50 p-4 rounded-xl border border-red-100 mb-6">
                    <div className="flex justify-between items-center mb-4">
                      <h3 className="font-semibold text-gray-800">Daftar Jam Mapel Kosong</h3>
                    </div>
                    
                    <div className="space-y-3">
                      {hoursData.map((h, i) => (
                        <div key={h.hour} className={`flex flex-col sm:flex-row gap-3 items-start sm:items-center p-3 rounded-lg border transition-all ${h.checked ? 'bg-white border-red-300 shadow-sm' : 'bg-gray-50 border-gray-200'}`}>
                          <div className="flex items-center w-32">
                            <input 
                              type="checkbox" 
                              id={`absent-hour-${h.hour}`}
                              checked={h.checked}
                              onChange={() => handleHourToggle(i)}
                              className="w-5 h-5 text-red-600 rounded border-gray-300 focus:ring-red-500"
                            />
                            <label htmlFor={`absent-hour-${h.hour}`} className="ml-3 font-medium text-gray-700 cursor-pointer">Jam ke-{h.hour}</label>
                          </div>
                          
                          {h.checked && (
                            <div className="flex-1 flex flex-col sm:flex-row gap-3 w-full">
                              <select 
                                value={h.className} 
                                onChange={(e) => handleHourChange(i, 'className', e.target.value)}
                                className="flex-1 border-gray-300 rounded-md text-sm p-2 border focus:ring-red-500 focus:border-red-500"
                              >
                                <option value="">- Kelas -</option>
                                {CLASSES.map(c => <option key={c} value={c}>{c}</option>)}
                              </select>
                              
                              <select 
                                value={h.missingTeacherId} 
                                onChange={(e) => handleHourChange(i, 'missingTeacherId', e.target.value)}
                                className="flex-[2] border-gray-300 rounded-md text-sm p-2 border focus:ring-red-500 focus:border-red-500"
                              >
                                <option value="">- Guru yang tidak hadir -</option>
                                {teachers.map(t => (
                                  <option key={t.id} value={t.id}>{t.name}</option>
                                ))}
                              </select>
                            </div>
                          )}
                        </div>
                      ))}
                    </div>
                  </div>

                  <button 
                    type="submit" 
                    className="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-4 rounded-xl transition-colors shadow-sm"
                  >
                    Simpan Guru Izin
                  </button>
                </form>
              )}
            </div>
          </div>
        );
      }

      function ManageTeachers({ teachers, setTeachers, showToast }) {
        const [name, setName] = useState('');
        const [jtm, setJtm] = useState({ mon: 0, tue: 0, wed: 0, thu: 0, fri: 0, sat: 0 });

        const handleSubmit = (e) => {
          e.preventDefault();
          if(!name) return;
          const newTeacher = { id: generateId(), name, jtm: {...jtm} };
          setTeachers([...teachers, newTeacher]);
          setName('');
          setJtm({ mon: 0, tue: 0, wed: 0, thu: 0, fri: 0, sat: 0 });
          showToast('Guru berhasil ditambahkan!');
        };

        const deleteTeacher = (id) => {
          if(confirm('Hapus guru ini?')) {
            setTeachers(teachers.filter(t => String(t.id) !== String(id)));
            showToast('Guru dihapus.');
          }
        };

        const updateJTM = (teacherId, day, value) => {
          const numValue = parseInt(value, 10) || 0;
          setTeachers(teachers.map(t => 
            String(t.id) === String(teacherId) ? { ...t, jtm: { ...t.jtm, [day]: numValue } } : t
          ));

          { key: 'fri', label: 'Jumat' }, { key: 'sat', label: 'Sabtu' }

            <div className="xl:col-span-3">

                        <th className="px-4 py-3">Nama Guru</th>
