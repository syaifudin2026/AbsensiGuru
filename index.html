                            </td>
                            <td className="px-2 py-3 text-center">
                              <input type="number" min="0" max="9" value={t.jtm.sat} onChange={e => updateJTM(t.id, 'sat', e.target.value)} className="w-12 text-center border border-gray-300 rounded p-1 focus:ring-emerald-500 focus:border-emerald-500" />
                            </td>
                            <td className="px-4 py-3 text-center font-bold text-emerald-600">{total}</td>
                            <td className="px-4 py-3 text-center">
                              <button onClick={() => deleteTeacher(t.id)} className="text-red-500 hover:text-red-700 p-1"><Icons.Trash /></button>
                            </td>
                          </tr>
                        )
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          </div>
        );
      }

      function ManageHolidays({ holidays, setHolidays, showToast }) {
        const [date, setDate] = useState('');

        const addHoliday = (e) => {
          e.preventDefault();
          if(!date) return;
          
          if(new Date(date).getDay() === 0) {
            return showToast('Hari Minggu sudah otomatis libur!', 'error');
          }

          if(holidays.includes(date)) return showToast('Tanggal ini sudah ditambahkan.', 'error');

          setHolidays([...holidays, date].sort());
          setDate('');
          showToast('Hari libur ditambahkan.');
        };

        const removeHoliday = (d) => {
          setHolidays(holidays.filter(h => h !== d));
        };

        return (
          <div className="max-w-2xl mx-auto bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <h3 className="font-bold text-gray-800 mb-4">Pengaturan Hari Libur</h3>
            <p className="text-sm text-gray-500 mb-4">Hari libur nasional/sekolah (Selain Minggu). Pada hari libur, JTM harian tidak akan ditambahkan ke target mengajar.</p>
            
            <form onSubmit={addHoliday} className="flex gap-3 mb-6">
              <input 
                type="date" 
                value={date} 
                onChange={e => setDate(e.target.value)} 
                className="flex-1 border p-2 rounded-lg focus:ring-emerald-500 focus:border-emerald-500" 
                required 
              />
              <button type="submit" className="bg-emerald-600 text-white px-6 py-2 rounded-lg font-medium">Tambah Libur</button>
            </form>

            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
              {holidays.map(h => (
                <div key={h} className="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-200">
                  <span className="text-sm font-medium">{new Date(h).toLocaleDateString('id-ID', {day: 'numeric', month:'short', year:'numeric'})}</span>
                  <button onClick={() => removeHoliday(h)} className="text-red-500 hover:text-red-700"><Icons.Trash /></button>
                </div>
              ))}
              {holidays.length === 0 && <p className="col-span-full text-center text-sm text-gray-400 py-4">Belum ada hari libur khusus yang diinput.</p>}
            </div>
          </div>
        );
      }

      function ManageLeaves({ leaves, setLeaves, teachers, showToast }) {
        const [teacherId, setTeacherId] = useState('');
        const [date, setDate] = useState('');
        const [reason, setReason] = useState('');

        const addLeave = (e) => {
          e.preventDefault();
          if(!teacherId || !date || !reason) return;
          
          setLeaves([...leaves, { id: generateId(), teacherId, date, reason }]);
          setTeacherId(''); setDate(''); setReason('');
          showToast('Izin berhasil dicatat.');
        };

        const getTeacherName = (id) => teachers.find(t => String(t.id) === String(id))?.name || 'Unknown';

        return (
          <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div className="md:col-span-1">
              <form onSubmit={addLeave} className="bg-white p-5 rounded-xl shadow-sm border border-gray-100">
                <h3 className="font-bold text-gray-800 mb-4">Input Izin Guru</h3>
                <div className="space-y-4">
                  <div>
                    <label className="block text-sm mb-1">Nama Guru</label>
                    <select value={teacherId} onChange={e=>setTeacherId(e.target.value)} className="w-full border p-2 rounded-lg" required>
                      <option value="">- Pilih Guru -</option>
                      {teachers.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
                    </select>
                  </div>
                  <div>
                    <label className="block text-sm mb-1">Tanggal</label>
                    <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="w-full border p-2 rounded-lg" required />
                  </div>
                  <div>
                    <label className="block text-sm mb-1">Alasan</label>
                    <textarea value={reason} onChange={e=>setReason(e.target.value)} className="w-full border p-2 rounded-lg" rows="3" required></textarea>
                  </div>
                  <button type="submit" className="w-full bg-emerald-600 text-white py-2 rounded-lg font-medium">Simpan Izin</button>
                </div>
              </form>
            </div>
            
            <div className="md:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 p-5">
               <h3 className="font-bold text-gray-800 mb-4">Riwayat Izin</h3>
               <div className="space-y-3">
                  {leaves.length === 0 && <p className="text-gray-400 text-sm text-center py-8">Belum ada data izin.</p>}
                  {[...leaves].sort((a,b) => new Date(b.date) - new Date(a.date)).map(l => (
                    <div key={l.id} className="flex justify-between items-start p-3 border rounded-lg bg-gray-50">
                      <div>
                        <p className="font-semibold text-emerald-900">{getTeacherName(l.teacherId)}</p>
                        <p className="text-xs text-gray-500 mb-1">{new Date(l.date).toLocaleDateString('id-ID', {weekday: 'long', day: 'numeric', month:'long', year:'numeric'})}</p>
                        <p className="text-sm text-gray-700">Alasan: {l.reason}</p>
                      </div>
                      <button onClick={() => setLeaves(leaves.filter(x => x.id !== l.id))} className="text-red-500 p-1"><Icons.Trash /></button>
                    </div>
                  ))}
               </div>
            </div>
          </div>
        );
      }

      function BisyarohView({ teachers, holidays, leaves, attendances, teacherAbsences, bisyarohColumns, setBisyarohColumns, bisyarohValues, setBisyarohValues, bisyarohLocks, setBisyarohLocks, showToast }) {
        const [startDate, setStartDate] = useState(() => {
          const d = new Date(); d.setDate(1); return d.toISOString().split('T')[0];
        });
        const [endDate, setEndDate] = useState(getTodayString());
        const [newColLabel, setNewColLabel] = useState('');
        const [newColType, setNewColType] = useState('kali');
        const [showPrint, setShowPrint] = useState(false);
        const [unlockModal, setUnlockModal] = useState(null); 

        // Hitung Sisa JTM Akhir tiap guru pada periode terpilih
        const jtmStats = useMemo(() => {
          if (!startDate || !endDate) return {};
          const dayMap = { 1: 'mon', 2: 'tue', 3: 'wed', 4: 'thu', 5: 'fri', 6: 'sat' };
          const stats = {};
          teachers.forEach(t => {
            stats[t.id] = { name: t.name, baseJTM: 0, subbedMinus: 0, absentMinus: 0, subbingPlus: 0 };
          });

          let currentDay = new Date(startDate);
          const end = new Date(endDate);
          while (currentDay <= end) {
            const dayOfWeek = currentDay.getDay();
            const dateStr = currentDay.toISOString().split('T')[0];
            if (dayOfWeek !== 0 && !holidays.includes(dateStr)) {
              const dayKey = dayMap[dayOfWeek];
              teachers.forEach(t => {
                if (stats[t.id]) stats[t.id].baseJTM += (t.jtm[dayKey] || 0);
              });
            }
            currentDay.setDate(currentDay.getDate() + 1);
          }

          attendances.forEach(att => {
            if (att.date >= startDate && att.date <= endDate) {
              att.hours.forEach(hour => {
                if (hour.subId) {
                  if (stats[att.teacherId]) stats[att.teacherId].subbingPlus += 1;
                  if (stats[hour.subId]) stats[hour.subId].subbedMinus += 1;
                }
              });
            }
          });

          teacherAbsences.forEach(abs => {
            if (abs.date >= startDate && abs.date <= endDate) {
              abs.hours.forEach(hour => {
                if (hour.missingTeacherId && stats[hour.missingTeacherId]) {
                  stats[hour.missingTeacherId].absentMinus += 1;
                }
              });
            }
          });

          const result = {};
          Object.keys(stats).forEach(id => {
            const s = stats[id];
            result[id] = { ...s, finalJTM: s.baseJTM - s.subbedMinus - s.absentMinus + s.subbingPlus };
          });
          return result;
        }, [startDate, endDate, teachers, holidays, attendances, teacherAbsences]);

        const getValue = (teacherId, colId) => {
          const found = bisyarohValues.find(v => String(v.teacherId) === String(teacherId) && String(v.columnId) === String(colId));
          return found ? found.value : 0;
        };

        const isLocked = (teacherId) => bisyarohLocks.some(id => String(id) === String(teacherId));

        const toggleLock = (teacherId) => {
          if (isLocked(teacherId)) {
            const teacher = teachers.find(t => String(t.id) === String(teacherId));
            setUnlockModal({ teacherId, teacherName: teacher ? teacher.name : 'Guru ini' });
          } else {
            setBisyarohLocks([...bisyarohLocks, teacherId]);
            showToast('✅ Baris dikunci, nilai tidak bisa diubah tanpa sengaja.');
          }
        };

        const confirmUnlock = () => {
          if (!unlockModal) return;
          setBisyarohLocks(bisyarohLocks.filter(id => String(id) !== String(unlockModal.teacherId)));
          showToast('🔓 Kunci dibuka, nilai bisa diubah kembali.');
          setUnlockModal(null);
        };

        const handleValueChange = (teacherId, colId, value) => {
          if (isLocked(teacherId)) {
            showToast('Baris guru ini terkunci. Buka kunci terlebih dahulu untuk mengubah nilai.', 'error');
            return;
          }
          const num = parseFloat(value) || 0;
          const exists = bisyarohValues.some(v => String(v.teacherId) === String(teacherId) && String(v.columnId) === String(colId));
          if (exists) {
            setBisyarohValues(bisyarohValues.map(v =>
              (String(v.teacherId) === String(teacherId) && String(v.columnId) === String(colId)) ? { ...v, value: num } : v
            ));
          } else {
            setBisyarohValues([...bisyarohValues, { teacherId, columnId: colId, value: num }]);
          }
        };

        const handleAddColumn = (e) => {
          e.preventDefault();
          if (!newColLabel.trim()) return;
          setBisyarohColumns([...bisyarohColumns, { id: generateId(), label: newColLabel.trim(), type: newColType }]);
          setNewColLabel('');
          setNewColType('kali');
          showToast('Kolom pedoman gaji ditambahkan!');
        };

        const handleDeleteColumn = (colId) => {
          if (!confirm('Hapus kolom ini? Semua nilai yang sudah diinput untuk kolom ini akan terhapus.')) return;
          setBisyarohColumns(bisyarohColumns.filter(c => c.id !== colId));
          setBisyarohValues(bisyarohValues.filter(v => String(v.columnId) !== String(colId)));
        };

        const computeTotal = (teacherId) => {
          const finalJTM = jtmStats[teacherId] ? jtmStats[teacherId].finalJTM : 0;
          return bisyarohColumns.reduce((sum, col) => {
            const val = getValue(teacherId, col.id);
            if (col.type === 'kali') return sum + (val * finalJTM);
            return sum + val;
          }, 0);
        };

        const formatRupiah = (num) => 'Rp ' + Math.round(num || 0).toLocaleString('id-ID');

        const grandTotal = useMemo(() => {
          return teachers.reduce((sum, t) => sum + computeTotal(t.id), 0);
        }, [teachers, bisyarohColumns, bisyarohValues, jtmStats]);

        const teacherChunks = useMemo(() => {
          const chunks = [];
          for (let i = 0; i < teachers.length; i += 6) {
            chunks.push(teachers.slice(i, i + 6));
          }
          return chunks.length > 0 ? chunks : [[]];
        }, [teachers]);

        const handlePrint = () => {
          setShowPrint(true);
          setTimeout(() => {
            window.print();
          }, 100);
        };

        useEffect(() => {
          const afterPrint = () => setShowPrint(false);
          window.addEventListener('afterprint', afterPrint);
          return () => window.removeEventListener('afterprint', afterPrint);
        }, []);

        const periodeLabel = (startDate && endDate)
          ? `${new Date(startDate).toLocaleDateString('id-ID')} s/d ${new Date(endDate).toLocaleDateString('id-ID')}`
          : '';

        return (
          <div className="space-y-6">

            {/* ===== MODAL KONFIRMASI BUKA KUNCI BISYAROH ===== */}
            {unlockModal && (
              <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{background:'rgba(0,0,0,0.45)'}}>
                <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden animate-bounce-in">
                  <div className="bg-amber-400 px-6 py-4 flex items-center gap-3">
                    <div className="bg-white rounded-full p-2 shadow">
                      <svg className="w-6 h-6 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm2-10V7a4 4 0 118 0" />
                      </svg>
                    </div>
                    <div>
                      <p className="text-amber-900 font-bold text-base leading-tight">Buka Kunci Bisyaroh</p>
                      <p className="text-amber-800 text-xs opacity-80">Konfirmasi diperlukan</p>
                    </div>
                  </div>
                  <div className="px-6 py-5">
                    <p className="text-gray-700 text-sm mb-1">Anda akan membuka kunci baris:</p>
                    <p className="font-bold text-emerald-800 text-base mb-3 bg-emerald-50 px-3 py-2 rounded-lg border border-emerald-200">👤 {unlockModal.teacherName}</p>
                    <p className="text-gray-500 text-xs leading-relaxed">Setelah dibuka, nilai bisyaroh pada baris ini <span className="font-semibold text-amber-700">dapat diubah kembali</span>. Pastikan perubahan sudah sesuai sebelum mengunci lagi.</p>
                  </div>
                  <div className="px-6 pb-5 flex gap-3">
                    <button
                      onClick={() => setUnlockModal(null)}
                      className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2.5 rounded-xl transition-colors text-sm"
                    >
                      Batal
                    </button>
                    <button
                      onClick={confirmUnlock}
                      className="flex-1 bg-amber-400 hover:bg-amber-500 text-white font-bold py-2.5 rounded-xl transition-colors text-sm flex items-center justify-center gap-2 shadow-md"
                    >
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm2-10V7a4 4 0 118 0" />
                      </svg>
                      Ya, Buka Kunci
                    </button>
                  </div>
                </div>
              </div>
            )}
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 print:hidden">
              <h3 className="font-bold text-gray-800 mb-4">Periode Perhitungan Sisa JTM Akhir</h3>
              <div className="flex flex-col sm:flex-row gap-4 items-end">
                <div>
                  <label className="block text-sm mb-1 text-gray-600">Tanggal Mulai</label>
                  <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} className="border p-2 rounded-lg" />
                </div>
                <div>
                  <label className="block text-sm mb-1 text-gray-600">Tanggal Akhir</label>
                  <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} className="border p-2 rounded-lg" />
                </div>
                <button onClick={handlePrint} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg font-medium flex items-center space-x-2">
                  <Icons.Printer /> <span>Cetak Nota Semua Guru</span>
                </button>
              </div>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 print:hidden">
              <h3 className="font-bold text-gray-800 mb-4">Kolom Pedoman Perhitungan Gaji</h3>
              <form onSubmit={handleAddColumn} className="flex flex-col sm:flex-row gap-3 items-end mb-4">
                <div className="flex-1 w-full">
                  <label className="block text-sm mb-1 text-gray-600">Nama Kolom</label>
                  <input type="text" value={newColLabel} onChange={e=>setNewColLabel(e.target.value)} placeholder="Contoh: Tarif per Jam / Tunjangan Transport" className="w-full border p-2 rounded-lg" required />
                </div>
                <div>
                  <label className="block text-sm mb-1 text-gray-600">Tipe Perhitungan</label>
                  <select value={newColType} onChange={e=>setNewColType(e.target.value)} className="border p-2 rounded-lg">
                    <option value="kali">Perkalian (x Sisa JTM Akhir)</option>
                    <option value="tambah">Tambahan Tetap (flat)</option>
                  </select>
                </div>
                <button type="submit" className="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2 rounded-lg font-medium whitespace-nowrap">+ Tambah Kolom</button>
              </form>
              {bisyarohColumns.length === 0 ? (
                <p className="text-gray-400 text-sm text-center py-4">Belum ada kolom pedoman gaji. Tambahkan kolom di atas, contoh: "Tarif per Jam" (perkalian) atau "Tunjangan" (tambahan tetap).</p>
              ) : (
                <div className="flex flex-wrap gap-2">
                  {bisyarohColumns.map(col => (
                    <div key={col.id} className="flex items-center gap-2 bg-gray-50 border rounded-lg px-3 py-1.5 text-sm">
                      <span className="font-medium">{col.label}</span>
                      <span className={`text-xs px-2 py-0.5 rounded-full ${col.type === 'kali' ? 'bg-blue-100 text-blue-700' : 'bg-amber-100 text-amber-700'}`}>
                        {col.type === 'kali' ? '× JTM' : 'Tetap'}
                      </span>
                      <button onClick={() => handleDeleteColumn(col.id)} className="text-red-500 hover:text-red-700"><Icons.Trash /></button>
                    </div>
                  ))}
                </div>
              )}
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 overflow-x-auto print:hidden">
              <h3 className="font-bold text-gray-800 mb-4">Tabel Perhitungan Bisyaroh per Guru &mdash; Periode {periodeLabel}</h3>
              <table className="w-full border-collapse text-sm min-w-max">
                <thead>
                  <tr className="bg-gray-100">
                    <th className="border p-2 text-left">Nama Guru</th>
                    <th className="border p-2 w-28">Sisa JTM Akhir</th>
                    {bisyarohColumns.map(col => (
                      <th key={col.id} className="border p-2 w-36">{col.label} <span className="text-[10px] text-gray-500 block">{col.type === 'kali' ? '(nilai × JTM)' : '(nominal tetap)'}</span></th>
                    ))}
                    <th className="border p-2 w-32 bg-emerald-50">Total Bisyaroh</th>
                    <th className="border p-2 w-20 text-center">Kunci</th>
                  </tr>
                </thead>
                <tbody>
                  {teachers.length === 0 && (
                    <tr><td colSpan={4 + bisyarohColumns.length} className="border p-4 text-center text-gray-400">Belum ada data guru.</td></tr>
                  )}
                  {teachers.map(t => {
                    const locked = isLocked(t.id);
                    return (
                    <tr key={t.id} className={locked ? 'bg-gray-50' : ''}>
                      <td className="border p-2 font-medium text-emerald-900">{t.name}</td>
                      <td className="border p-2 text-center font-semibold">{jtmStats[t.id] ? jtmStats[t.id].finalJTM : 0}</td>
                      {bisyarohColumns.map(col => (
                        <td key={col.id} className="border p-1">
                          <input
                            type="number"
                            value={getValue(t.id, col.id) || ''}
                            onChange={e => handleValueChange(t.id, col.id, e.target.value)}
                            disabled={locked}
                            className={`w-full border rounded p-1.5 text-right ${locked ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : ''}`}
                            placeholder="0"
                          />
                        </td>
                      ))}
                      <td className="border p-2 text-right font-bold bg-emerald-50">{formatRupiah(computeTotal(t.id))}</td>
                      <td className="border p-2 text-center">
                        <button
                          onClick={() => toggleLock(t.id)}
                          title={locked ? 'Buka kunci baris ini' : 'Kunci baris ini'}
                          className={`inline-flex items-center justify-center p-1.5 rounded-md ${locked ? 'bg-red-100 text-red-600 hover:bg-red-200' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}
                        >
                          {locked ? <Icons.Lock /> : <Icons.Unlock />}
                        </button>
                      </td>
                    </tr>
                  )})}
                </tbody>
                {teachers.length > 0 && (
                  <tfoot>
                    <tr className="bg-emerald-100">
                      <td className="border p-2 font-bold text-emerald-900" colSpan={2 + bisyarohColumns.length}>TOTAL AKHIR BISYAROH SELURUH GURU</td>
                      <td className="border p-2 text-right font-bold text-emerald-900">{formatRupiah(grandTotal)}</td>
                      <td className="border p-2"></td>
                    </tr>
                  </tfoot>
                )}
              </table>
              {bisyarohColumns.length === 0 && teachers.length > 0 && (
                <p className="text-gray-400 text-xs mt-3">Tambahkan minimal satu kolom pedoman gaji di atas agar perhitungan total bisyaroh dapat ditampilkan.</p>
              )}
              {teachers.length > 0 && (
                <p className="text-gray-400 text-xs mt-3 flex items-center gap-1.5">
                  <Icons.Lock /> Klik ikon kunci pada baris guru untuk mengamankan nilai yang sudah final agar tidak berubah tanpa sengaja. Klik lagi untuk membuka kunci.
                </p>
              )}
            </div>

            {}
            {/* Area Cetak Nota: Telah dimodifikasi agar rapat dan pas ukuran cetak A6 per nota */}
            {showPrint && (
              <div className="nota-print-area">
                {teacherChunks.map((chunk, pageIdx) => (
                  <div key={pageIdx} className="nota-print-page">
                    {chunk.map(t => (
                      <div key={t.id} className="nota-card border border-black p-3 font-serif text-xs flex flex-col">
                        <div className="text-center border-b border-black pb-1 mb-2">
                          <p className="font-bold text-sm uppercase">Nota Bisyaroh / Gaji</p>
                          <p className="font-bold uppercase">MI Khadijah</p>
                        </div>
                        <div className="mb-2">
                          <p><span className="font-semibold">Nama Guru</span> : {t.name}</p>
                          <p><span className="font-semibold">Periode</span> : {periodeLabel}</p>
                          <p><span className="font-semibold">Sisa JTM Akhir</span> : {jtmStats[t.id] ? jtmStats[t.id].finalJTM : 0} jam</p>
                        </div>
                        <table className="w-full border-collapse border border-black mb-2">
                          <thead>
                            <tr className="bg-gray-100">
                              <th className="border border-black p-1 text-left">Komponen</th>
                              <th className="border border-black p-1 text-right">Jumlah</th>
                            </tr>
                          </thead>
                          <tbody>
                            {bisyarohColumns.length === 0 && (
                              <tr><td colSpan="2" className="border border-black p-1 text-center text-gray-500">- Belum ada komponen -</td></tr>
                            )}
                            {bisyarohColumns.map(col => {
                              const val = getValue(t.id, col.id);
                              const finalJTM = jtmStats[t.id] ? jtmStats[t.id].finalJTM : 0;
                              const amount = col.type === 'kali' ? val * finalJTM : val;
                              return (
                                <tr key={col.id}>
                                  {/* Diperbarui: Menyembunyikan nilai perkalian tarif perjam sesuai instruksi */}
                                  <td className="border border-black p-1">
                                    {col.label}
                                  </td>
                                  <td className="border border-black p-1 text-right">{formatRupiah(amount)}</td>
                                </tr>
                              );
                            })}
                          </tbody>
                          <tfoot>
                            <tr>
                              <td className="border border-black p-1 font-bold">TOTAL</td>
                              <td className="border border-black p-1 text-right font-bold">{formatRupiah(computeTotal(t.id))}</td>
                            </tr>
                          </tfoot>
                        </table>
                        <div className="mt-auto flex justify-between text-center pt-2">
                          <div>
                            <p>Penerima,</p>
                            <br/>
                            <p className="border-b border-black px-4">&nbsp;</p>
                          </div>
                          <div>
                            <p>Bendahara,</p>
                            <br/>
                            <p className="border-b border-black px-4">&nbsp;</p>
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      function ReportView({ teachers, holidays, leaves, attendances, teacherAbsences }) {
        const [startDate, setStartDate] = useState(() => {
          const d = new Date(); d.setDate(1); return d.toISOString().split('T')[0];
        });
        const [endDate, setEndDate] = useState(getTodayString());

        const reportData = useMemo(() => {
          if (!startDate || !endDate) return null;
          
          const start = new Date(startDate);
          const end = new Date(endDate);
          const dayMap = { 1: 'mon', 2: 'tue', 3: 'wed', 4: 'thu', 5: 'fri', 6: 'sat' };

          const stats = {};
          teachers.forEach(t => {
            stats[t.id] = { name: t.name, baseJTM: 0, subbedMinus: 0, absentMinus: 0, subbingPlus: 0 };
          });

          let currentDay = new Date(start);
          while (currentDay <= end) {
            const dayOfWeek = currentDay.getDay(); 
            const dateStr = currentDay.toISOString().split('T')[0];
            
            if (dayOfWeek !== 0 && !holidays.includes(dateStr)) {
              const dayKey = dayMap[dayOfWeek];
              teachers.forEach(t => {
                if (stats[t.id]) {
                  stats[t.id].baseJTM += t.jtm[dayKey];
                }
              });
            }
            currentDay.setDate(currentDay.getDate() + 1);
          }
          
          attendances.forEach(att => {
            if (att.date >= startDate && att.date <= endDate) {
              att.hours.forEach(hour => {
                if (hour.subId) {
                  if (stats[att.teacherId]) stats[att.teacherId].subbingPlus += 1;
                  if (stats[hour.subId]) stats[hour.subId].subbedMinus += 1;
                }
              });
            }
          });

          teacherAbsences.forEach(abs => {
            if (abs.date >= startDate && abs.date <= endDate) {
              abs.hours.forEach(hour => {
                 if (hour.missingTeacherId && stats[hour.missingTeacherId]) {
                    stats[hour.missingTeacherId].absentMinus += 1;
                 }
              });
            }
          });

          const leaveRecaps = leaves
            .filter(l => l.date >= startDate && l.date <= endDate)
            .map(l => ({
              name: teachers.find(t=>String(t.id)===String(l.teacherId))?.name || 'Unknown',
              date: l.date,
              reason: l.reason
            }));

          const finalTable1 = Object.values(stats).map(s => ({
            ...s,
            finalJTM: s.baseJTM - s.subbedMinus - s.absentMinus + s.subbingPlus
          }));

          return { table1: finalTable1, table3: leaveRecaps };

        }, [startDate, endDate, teachers, holidays, leaves, attendances, teacherAbsences]);

        const handlePrint = () => {
          window.print();
        };

        return (
          <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <div className="print:hidden border-b pb-6 mb-6">
              <h3 className="font-bold text-gray-800 mb-4">Pengaturan Cetak Laporan</h3>
              <div className="flex flex-col sm:flex-row gap-4 items-end">
                <div>
                  <label className="block text-sm mb-1 text-gray-600">Tanggal Awal</label>
                  <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} className="border p-2 rounded-lg" />
                </div>
                <div>
                  <label className="block text-sm mb-1 text-gray-600">Tanggal Akhir</label>
                  <input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} className="border p-2 rounded-lg" />
                </div>
                <button onClick={handlePrint} className="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-2 rounded-lg font-medium flex items-center space-x-2">
                  <Icons.Printer /> <span>Cetak PDF</span>
                </button>
              </div>
            </div>

            {reportData && (
              <div className="print-area font-serif text-sm">
                <div className="text-center mb-8 border-b-2 border-black pb-4">
                  <h2 className="text-xl font-bold uppercase tracking-wider">Laporan Kehadiran Guru</h2>
                  <h1 className="text-2xl font-bold uppercase tracking-wider text-emerald-900">MI KHADIJAH</h1>
                  <p className="text-gray-600 mt-1">Periode: {new Date(startDate).toLocaleDateString('id-ID')} s/d {new Date(endDate).toLocaleDateString('id-ID')}</p>
                </div>

                <div className="mb-8 break-inside-avoid">
                  <h3 className="font-bold text-lg mb-3 bg-gray-100 p-2 border-l-4 border-emerald-600">1. Rekapitulasi Jam Tugas Mengajar (JTM)</h3>
                  <table className="w-full border-collapse border border-black text-center text-xs">
                    <thead className="bg-gray-50">
                      <tr>
                        <th className="border border-black p-2 w-8">No</th>
                        <th className="border border-black p-2 text-left">Nama Guru</th>
                        <th className="border border-black p-2 w-24">JTM Wajib<br/><span className="text-[10px] font-normal">(Tanpa Libur)</span></th>
                        <th className="border border-black p-2 w-24">Digantikan<br/><span className="text-[10px] font-normal text-red-600">(- Kurang)</span></th>
                        <th className="border border-black p-2 w-24">Tidak Hadir<br/><span className="text-[10px] font-normal text-red-600">(- Kurang)</span></th>
                        <th className="border border-black p-2 w-24">Menggantikan<br/><span className="text-[10px] font-normal text-emerald-600">(+ Tambah)</span></th>
                        <th className="border border-black p-2 w-24">Sisa JTM Akhir</th>
                      </tr>
                    </thead>
                    <tbody>
                      {reportData.table1.map((row, i) => (
                        <tr key={i}>
                          <td className="border border-black p-2">{i+1}</td>
                          <td className="border border-black p-2 text-left font-medium text-sm">{row.name}</td>
                          <td className="border border-black p-2">{row.baseJTM}</td>
                          <td className="border border-black p-2 text-red-600">{row.subbedMinus}</td>
                          <td className="border border-black p-2 text-red-600 font-bold">{row.absentMinus}</td>
                          <td className="border border-black p-2 text-emerald-600">{row.subbingPlus}</td>
                          <td className="border border-black p-2 font-bold bg-emerald-50 text-sm">{row.finalJTM}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>

                <div className="break-inside-avoid">
                  <h3 className="font-bold text-lg mb-3 bg-gray-100 p-2 border-l-4 border-emerald-600">2. Rekapitulasi Izin Guru Harian</h3>
                  <table className="w-full border-collapse border border-black text-left">
                    <thead className="bg-gray-50 text-center">
                      <tr>
                        <th className="border border-black p-2 w-10">No</th>
                        <th className="border border-black p-2 w-48">Nama Guru</th>
                        <th className="border border-black p-2 w-40">Tanggal Izin</th>
                        <th className="border border-black p-2">Alasan / Keterangan</th>
                      </tr>
                    </thead>
                    <tbody>
                       {reportData.table3.length === 0 && <tr><td colSpan="4" className="border border-black p-4 text-center text-gray-500">Tidak ada data izin pada periode ini.</td></tr>}
                       {reportData.table3.sort((a,b) => new Date(a.date) - new Date(b.date)).map((row, i) => (
                        <tr key={i}>
                          <td className="border border-black p-2 text-center">{i+1}</td>
                          <td className="border border-black p-2 font-medium">{row.name}</td>
                          <td className="border border-black p-2 text-center">{new Date(row.date).toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'short', year:'numeric'})}</td>
                          <td className="border border-black p-2">{row.reason}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
                
                <div className="mt-16 flex justify-end">
                   <div className="text-center">
                     <p>Kepala MI Khadijah</p>
                     <br/><br/><br/>
                     <p className="font-bold border-b border-black inline-block px-8">________________________</p>
                   </div>
                </div>
              </div>
            )}
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
